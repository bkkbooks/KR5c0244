front:
  text: 太上肘後玉經方
  hash: sha256:0af3622b9766f56d67629cc1127f6162b8173f2c76295cc09c6f5d29c06ec076
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0244_HFL_000-001a, image: hfl/0573/0573-104.png}
body:
  text: 霞栖子盧遵元編昔巢居子奉事東海靑童君以節苦心寂奉師禮冒暑雨祁寒無懈無怠僅二十年乃口授玄法手錄聖方曰若求跨鶴昇九霄未易致也優遊乾坤之内守灝然之氣容色不改心目清朗壽数百年不歸得矣然神仙袐術不可俘失其人長安年中巢居子以寒棲子賢人也使沐浴齋戒乃授其事而貞元八年寒棲子以余不揆陋微游放自釋所從來者匪世俗之士無聲利之交若天與之正性謂不虛授乃使傳在余以隱棲子文華之士昔登上科忽遺馳騖息心道門僅六七年其玄法袐術無不得之而至理之要曽似未遇顧余有此遺禮留愛久之而言余亦知其志士也况忘爵禄遯時稱騷雅之什有而若無實而苦虚者哉必當羽化雲飛豈止龜鶴齊夀故寶暦乙未嵗霞栖子盧遵元持太上八方絪緼玄寶一軸以授隠棲施君敬之戒之善自勤勉以致靈效云耳乾天父地母七精散方竹實三天兩日之精九蒸九曝主木氣地膚子四大兩太隂之精主肝明日黄精四大雨戊巳之精主脾藏蔓精子三大两九蒸主邪鬼明目松脂三大兩錬令熟主風狂痺濕桃膠四大兩五木之精主鬼忤巨勝五大兩五穀之精九曝右方昔傳責帝服之上昇欲俘立壇焚香啓上帝然可授之立盟不泄四十年一傳之不爾太上奪算七代受考於水官慎之坤風后四扇散方五靈脂三大兩延年益命仙靈脾三大兩强筋骨松脂三大瘀生風癎澤瀉三大兩强腎根术二大兩益氣力乾薑二大兩益氣生乾地黄五大兩補髓血石菖蒲三大兩益心神桂心三大兩補虛之不足雲母粉四大兩長風膚肥白右方風后傳責帝髙丘子授之後傳芽固欲傅立誓不妄泄之各擣為散仍合擣三萬杵蜜丸亦得也艮王君河車方紫河車一具王母歌曰紫汀車一龍潜爕易却老還童枯楊再益下文江日紫汀車者首女是也東流洗断血一百遍酒洗五十過隂乾曝合和生乾地黄八大兩補髓血牛膝四大兩主腰膝菊花三大兩去筋風五味子三大兩主五藏嵸蓉三兩助莖女人去之覆盆子四大兩主隂不足巴㦸天二大兩欲多世事加一女人去之訶黎勒皮三大兩主胷中氣鼓子花二兩臟筋骨苦𨉁二大兩治諸毒藥甘草代菖蒲三大兩益精神乾膝三兩去肌肉五藏風沙令黄柏子仁三雨添精茯苓三兩安神雲英粉三兩縮腸黃精二兩補脾胃金釵石斛二兩添筋澤㵼三大雨補男子女人違忘二大雨益心力不忘杏仁四大兩炒令魚去尖皮去惡血氣巨勝四大兩延年駐形神古二十二味擣散蜜丸服三劑顔如女子昔傅蘇林子欲俘立盟秋血下爾太上科之巽龜臺王母四童散方丹砂七兩朱砂三兩巳上胡麻四大兩天門冬四兩茯苓五兩术三兩乾黄精五兩桃仁四兩去尖皮右八味合𢷬三萬杵冬月散夏月丸之服八年顏如嬰童之狀肌膚如凝脂昔傳茅哀立盟勿傅遠者太上科之慎歟慎歟離彭君糜角粉方麋角三具兩具不限多少解開厚三分長五寸許去心惡物米泔浸夏三日一换冬十日一换一月巳上似欲軟入甑中蒸之覆以桑白皮俠爛如芋曝乾粉之每斤入伏炎硫責一兩穈食葍蒲精實入角也此方彭君服之壽七百七十九歲搜入地胇山去不知所在今人云彭逝謬百別自有傳此方有人於鶴鳴山石洞獲之誓不宣泄也兊夏姬杏金丹方杳子仁六斗水研之取一䂖八斗入鐵釜中煑之先以羊脂揩鐵釜今三斤脂畫即下杏仁汁以穗火煑之四十九日乃取以構子煎九如大豆日服一丸三兩為一劑此夏撒書母服三劑爲少女後白日上昇其方岀羡門子上經立盟勿泄殃及七伐慎之慎之坎南嶽眞人赤松子拘杞煎方枸杞根三十斤取皮別著九蒸九曝擣粉取根骨煎之添水可三䂖後併煎之可如稀餳即入前朴和丸丸如梧相子服之一劑壽如百年此方傳李八百立盟勿傳天殃將罰震清精先生米飯方白粱米一石南燭汁浸九蒸九曝乾可三斗巳上每日煑一匙一月後可丰匙兩月後可三分與一賜化為筋風寰丁能傷鬚鬚如青絲顔知冰玉此方傅絿女服之役使六丁天兵衛侍祕赱勿傳當獲神仙切慎切慎太上肘後玉經方
